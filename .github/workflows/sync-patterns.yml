name: Sync Patterns from Drive

on:
  schedule:
    # Daily at 05:00 UTC. Drive edits made the prior day land in the
    # repo before Michael starts a new session.
    - cron: "0 5 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: patterns-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run sync
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
        run: python scripts/sync.py

      - name: Commit and push if changed
        run: |
          set -euo pipefail

          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"

          git add -A
          git commit -m "chore(sync): patterns from Drive ($(date -u +%Y-%m-%d))"
          git push
