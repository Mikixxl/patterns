name: Diagnose sad-ingest failure

on:
  push:
    paths:
      - '.github/workflows/trigger-sad-ingest.yml'
      - 'scripts/trigger_sad_ingest.py'

permissions:
  contents: write

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests google-api-python-client google-auth

      - name: Inspect sad-ingest run failure
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
        run: |
          mkdir -p logs
          python scripts/trigger_sad_ingest.py 2>&1 | tee logs/diagnose-$(date -u +%H%M%S).log

      - name: Commit logs
        if: always()
        run: |
          set -e
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add logs/ 2>/dev/null || true
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "diag: sad-ingest failure inspection"
            git push
          fi

      - name: Self-delete
        if: always()
        run: |
          set -e
          git pull --rebase || true
          [ -f .github/workflows/trigger-sad-ingest.yml ] && git rm .github/workflows/trigger-sad-ingest.yml || true
          [ -f scripts/trigger_sad_ingest.py ] && git rm scripts/trigger_sad_ingest.py || true
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: remove sad-ingest diagnostic"
            git push
          fi
