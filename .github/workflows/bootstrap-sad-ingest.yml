name: Bootstrap sad-ingest secrets

on:
  push:
    paths:
      - '.github/workflows/bootstrap-sad-ingest.yml'

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pynacl requests google-api-python-client google-auth

      - name: Bootstrap sad-ingest secrets and trigger first run
        id: bootstrap_run
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
        run: python scripts/bootstrap_sad_ingest.py

      - name: Self-delete bootstrap workflow and script
        if: always()
        run: |
          set -e
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git rm .github/workflows/bootstrap-sad-ingest.yml scripts/bootstrap_sad_ingest.py
          git commit -m "chore: remove bootstrap workflow (bootstrap step status: ${{ steps.bootstrap_run.outcome }})"
          git push
