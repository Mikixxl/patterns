name: Bootstrap sad-ingest secrets

on:
  push:
    paths:
      - '.github/workflows/bootstrap-sad-ingest.yml'

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sanity check - verify env var presence
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
        run: |
          set -e
          echo "GOOGLE_SA_JSON byte length: ${#GOOGLE_SA_JSON}"
          if [ -z "$GOOGLE_SA_JSON" ]; then
            echo "ERROR: GOOGLE_SA_JSON secret is missing or empty in patterns repo"
            exit 1
          fi
          echo "First 30 bytes: ${GOOGLE_SA_JSON:0:30}"
          echo "Last 30 bytes: ${GOOGLE_SA_JSON: -30}"
          echo "OK"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install google-api-python-client google-auth

      - name: Extract credentials from KEYS-REPOSITORY
        id: extract
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
        run: |
          python scripts/bootstrap_sad_ingest.py > /tmp/creds.env
          # Confirm output exists but never echo its contents
          if [ ! -s /tmp/creds.env ]; then
            echo "ERROR: credential extraction produced empty output"
            exit 1
          fi
          echo "OK creds.env written ($(wc -c < /tmp/creds.env) bytes)"

      - name: Set secrets and trigger workflow on sad-ingest
        env:
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
        run: |
          set -e
          # shellcheck disable=SC1091
          source /tmp/creds.env

          export GH_TOKEN="$EXTRACTED_PAT"

          echo "Setting ANTHROPIC_API_KEY on sad-ingest..."
          printf '%s' "$EXTRACTED_ANTHROPIC" | gh secret set ANTHROPIC_API_KEY --repo Mikixxl/sad-ingest --body -

          echo "Setting GOOGLE_SA_JSON on sad-ingest..."
          printf '%s' "$GOOGLE_SA_JSON" | gh secret set GOOGLE_SA_JSON --repo Mikixxl/sad-ingest --body -

          echo "Listing sad-ingest secrets to confirm both set..."
          gh secret list --repo Mikixxl/sad-ingest

          echo "Triggering first sad-ingest workflow run..."
          gh workflow run sad-ingest.yml --repo Mikixxl/sad-ingest --ref main

          echo "DONE"

      - name: Wipe credentials file
        if: always()
        run: rm -f /tmp/creds.env

      - name: Self-delete bootstrap workflow and script
        if: always()
        run: |
          set -e
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git rm .github/workflows/bootstrap-sad-ingest.yml scripts/bootstrap_sad_ingest.py
          git commit -m "chore: remove bootstrap workflow (v3 run completed)"
          git push
